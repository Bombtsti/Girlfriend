<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双标程度鉴定中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&family=ZCOOL+KuaiLe&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --fg: #f0f0f0;
            --muted: #777;
            --accent: #ff0044;
            --accent2: #ffc400;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .fun-font {
            font-family: 'ZCOOL KuaiLe', 'Noto Sans SC', sans-serif;
        }

        /* 背景Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 浮动光球 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 1;
        }

        .orb1 {
            width: 400px;
            height: 400px;
            background: rgba(255, 0, 68, 0.08);
            top: -100px;
            right: -100px;
        }

        .orb2 {
            width: 300px;
            height: 300px;
            background: rgba(255, 196, 0, 0.06);
            bottom: -50px;
            left: -80px;
        }

        .orb3 {
            width: 250px;
            height: 250px;
            background: rgba(255, 0, 68, 0.05);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 页面 */
        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .page.hidden {
            opacity: 0;
            transform: scale(0.96) translateY(20px);
            pointer-events: none;
        }

        /* 开场 */
        .main-title {
            font-size: clamp(2.8rem, 9vw, 5.5rem);
            font-weight: 900;
            line-height: 1.1;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: var(--muted);
            text-align: center;
            margin-top: 1.2rem;
            max-width: 500px;
            line-height: 1.8;
        }

        .warning-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .warning-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            background: rgba(255, 0, 68, 0.1);
            border: 1px solid rgba(255, 0, 68, 0.25);
            border-radius: 50px;
            color: #ff6b8a;
        }

        .start-btn {
            margin-top: 2.5rem;
            padding: 1.1rem 3.5rem;
            font-size: 1.3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #ff3366);
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            letter-spacing: 2px;
        }

        .start-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 0 50px rgba(255, 0, 68, 0.4);
        }

        .start-btn:active {
            transform: scale(0.97);
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        /* 进度条 */
        .progress-wrap {
            width: 100%;
            max-width: 620px;
            margin-bottom: 1.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.5s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* 题目卡片 */
        .question-card {
            width: 100%;
            max-width: 620px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            animation: cardIn 0.45s ease;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .q-number {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 0.6rem;
            letter-spacing: 1px;
        }

        .q-text {
            font-size: clamp(1.05rem, 2.8vw, 1.3rem);
            font-weight: 700;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        /* 选项 */
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 0.9rem 1.2rem;
            margin-bottom: 0.65rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--fg);
            font-size: 0.92rem;
            line-height: 1.6;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .option-btn:hover {
            background: rgba(255, 0, 68, 0.08);
            border-color: rgba(255, 0, 68, 0.4);
            transform: translateX(5px);
        }

        .option-btn.selected {
            background: rgba(255, 0, 68, 0.15);
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(255, 0, 68, 0.12);
        }

        .opt-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .option-btn.selected .opt-letter {
            background: var(--accent);
            color: white;
        }

        /* 结果页 */
        .result-card {
            width: 100%;
            max-width: 620px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-align: center;
            animation: resultPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes resultPop {
            from {
                opacity: 0;
                transform: scale(0.7) translateY(40px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .result-label {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .result-percent {
            font-size: clamp(4rem, 16vw, 7rem);
            font-weight: 900;
            line-height: 1;
        }

        .result-title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 900;
            margin-top: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .result-desc {
            font-size: 0.95rem;
            line-height: 2;
            color: rgba(255, 255, 255, 0.8);
            text-align: left;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border-left: 3px solid var(--accent);
        }

        .action-btns {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .act-btn {
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .act-btn.primary {
            background: linear-gradient(135deg, var(--accent), #ff3366);
            color: white;
        }

        .act-btn.secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid var(--border);
        }

        .act-btn:hover {
            transform: scale(1.05);
        }

        .act-btn:active {
            transform: scale(0.97);
        }

        /* 结果页背景色变化 */
        .result-bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 0.9rem 2rem;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            z-index: 200;
            transition: transform 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* 仪表盘SVG */
        .gauge-svg {
            margin: 0 auto 1rem;
            display: block;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 640px) {
            .question-card {
                padding: 1.25rem;
            }

            .result-card {
                padding: 1.5rem 1.25rem;
            }
        }
    </style>
</head>

<body>

    <!-- 背景Canvas -->
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <!-- 浮动光球 -->
    <div class="glow-orb orb1" aria-hidden="true"></div>
    <div class="glow-orb orb2" aria-hidden="true"></div>
    <div class="glow-orb orb3" aria-hidden="true"></div>

    <!-- 结果背景色 -->
    <div class="result-bg-overlay" id="resultBg" aria-hidden="true"></div>

    <!-- ========== 开场页 ========== -->
    <div class="page" id="startPage">
        <div class="warning-strip">
            <span class="warning-tag"><i class="fa-solid fa-triangle-exclamation"></i> 测出极端结果概不负责</span>
            <span class="warning-tag"><i class="fa-solid fa-skull-crossbones"></i> 心理承受能力弱者慎入</span>
            <span class="warning-tag"><i class="fa-solid fa-ban"></i> 请勿对号入座</span>
        </div>
        <h1 class="main-title fun-font" style="margin-top:1.5rem;">双标程度<br>鉴定中心</h1>
        <p class="subtitle">本中心采用国际领先（并没有）的检测技术，通过 35 道灵魂拷问，精准鉴定你骨子里的双标含量。结果如有冒犯，那绝对是故意的。</p>
        <p
            style="color:var(--muted);font-size:0.85rem;margin-top:1rem;text-align:center;max-width:420px;line-height:1.7;">
            全程约 3 分钟 · 共 35 题 · 10 种等级<br>请根据第一反应作答，想太多只会让你显得更双标
        </p>
        <button class="start-btn fun-font" onclick="startQuiz()" aria-label="开始测试">
            开始接受审判
        </button>
    </div>

    <!-- ========== 答题页 ========== -->
    <div class="page hidden" id="quizPage">
        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
            <div class="progress-info">
                <span id="progressLabel">第 1 / 30 题</span>
                <span id="progressPercent">0%</span>
            </div>
        </div>
        <div class="question-card" id="questionCard">
            <div class="q-number" id="qNumber">QUESTION 01</div>
            <div class="q-text" id="qText"></div>
            <div id="optionsContainer"></div>
        </div>
    </div>

    <!-- ========== 结果页 ========== -->
    <div class="page hidden" id="resultPage">
        <div class="result-card" id="resultCard">
            <div class="result-label">你的双标程度鉴定结果</div>
            <!-- SVG仪表盘 -->
            <svg class="gauge-svg" width="220" height="130" viewBox="0 0 220 130" aria-hidden="true">
                <path d="M20 120 A90 90 0 0 1 200 120" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="12"
                    stroke-linecap="round" />
                <path id="gaugeFill" d="M20 120 A90 90 0 0 1 200 120" fill="none" stroke="var(--accent)"
                    stroke-width="12" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="283"
                    style="transition: stroke-dashoffset 1.5s ease, stroke 0.5s;" />
                <text id="gaugeText" x="110" y="108" text-anchor="middle" fill="var(--fg)" font-size="36"
                    font-weight="900">0%</text>
            </svg>
            <div class="result-percent" id="resultPercent" style="display:none;"></div>
            <div class="result-title fun-font" id="resultTitle"></div>
            <div class="result-desc" id="resultDesc"></div>
            <div class="action-btns">
                <button class="act-btn primary" onclick="copyResult()" aria-label="复制结果">
                    <i class="fa-solid fa-copy"></i>&nbsp; 骄傲地复制
                </button>
                <button class="act-btn secondary" onclick="restartQuiz()" aria-label="重新测试">
                    <i class="fa-solid fa-rotate-right"></i>&nbsp; 重新鉴定
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============ 粒子背景 ============
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 60;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.3 - 0.15;
                this.opacity = Math.random() * 0.4 + 0.1;
                this.color = Math.random() > 0.6 ? '#ff0044' : '#ffc400';
                this.life = Math.random() * 300 + 200;
                this.maxLife = this.life;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
                if (this.life <= 0 || this.x < -10 || this.x > canvas.width + 10 || this.y < -10 || this.y > canvas.height + 10) {
                    this.reset();
                }
            }
            draw() {
                const fadeRatio = Math.min(this.life / this.maxLife, (this.maxLife - this.life) / 50);
                const alpha = this.opacity * Math.max(0, Math.min(1, fadeRatio));
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', `,${alpha})`).replace('rgb', 'rgba').replace('#ff0044', `rgba(255,0,68,${alpha})`).replace('#ffc400', `rgba(255,196,0,${alpha})`);
                // 简化颜色处理
                if (this.color === '#ff0044') {
                    ctx.fillStyle = `rgba(255,0,68,${alpha})`;
                } else {
                    ctx.fillStyle = `rgba(255,196,0,${alpha})`;
                }
                ctx.fill();
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ============ 题目数据 ============
        const questions = [
            {
                q: "你和对象吵架生气了，你们俩谁的错？",
                o: [
                    "谁错就是谁的错，对事不对人",
                    "我生气肯定是被惹到了，TA生气多半是在无理取闹",
                    "我生气叫委屈需要被哄，TA生气叫脾气大不成熟",
                    "我生气TA必须立刻滑跪道歉！TA敢生气？TA有什么资格生气？！"
                ]
            },
            {
                q: "关于回消息的速度，你和对象谁更该被原谅？",
                o: [
                    "谁忙谁就晚点回，互相理解",
                    "我没回是在忙正事，TA没回...是不是在跟别人聊天？",
                    "我已读不回是忘了，TA已读不回就是不在乎我了！",
                    "我半天不回叫独立空间，TA三分钟不回我直接夺命连环call加分手警告"
                ]
            },
            {
                q: "你来大姨妈（或身体不适）vs 对象生病了，怎么处理？",
                o: [
                    "都不舒服，互相照顾",
                    "我痛得死去活来必须被伺候，TA就一个感冒多喝热水就行了",
                    "我不舒服TA必须请假陪我，TA不舒服别传染给我离我远点",
                    "我来大姨妈是世界级灾难TA得捧着我，TA来'大姨夫'矫情什么？男人也配喊痛？"
                ]
            },
            {
                q: "关于和异性朋友保持联系，你怎么看？",
                o: [
                    "一样的要求，都有交友自由，保持边界就行",
                    "我的异性朋友都是认识多年的好哥们/好闺蜜，TA的异性朋友怎么看都像绿茶/渣男",
                    "我跟异性聊天叫正常社交，TA跟异性聊天叫精神出轨",
                    "我列表里有一百个异性也是人缘好，TA敢多看别的异性一眼就是绿帽预备役！"
                ]
            },
            {
                q: "走在街上看到帅哥/美女，你和对象谁可以看？",
                o: [
                    "谁看都无所谓，欣赏美是人的天性",
                    "我偷偷瞄两眼是审美，TA盯着看我就不舒服了",
                    "我看叫欣赏美丽事物，TA看叫色眯眯不正经",
                    "我看帅哥/美女叫目光正常停留，TA敢转头看别人？眼珠子给我抠出来！"
                ]
            },
            {
                q: "你和同事都迟到了，你的内心想法是？",
                o: [
                    "我们都该反思一下时间管理",
                    "我是真堵车了，他嘛...不好说",
                    "我迟到是天意，他迟到是态度问题",
                    "迟到是我的自由！但他迟到就是不尊重人！"
                ]
            },
            {
                q: "你发的朋友圈没人点赞，别人的朋友圈点赞过百，你怎么想？",
                o: [
                    "可能他的内容更有趣吧",
                    "我发的是生活记录，他们发的是媚俗内容",
                    "朋友圈这些人审美有问题，看不出我的高级",
                    "我发没人看是世道不行，他发有人赞肯定是充了会员"
                ]
            },
            {
                q: "关于借钱这件事，你最认同哪种说法？",
                o: [
                    "借了就该还，不管是谁都一样",
                    "我借钱是真有困难，别人借钱谁知道干啥去了",
                    "我借钱不还是真还不上，别人借钱不还就是人品差",
                    "借我的钱我可以慢慢还，但我借出去的钱你最好明天就还"
                ]
            },
            {
                q: "关于回消息的速度，你怎么看？",
                o: [
                    "没回就是在忙，互相理解",
                    "我没回是在忙正事，别人没回我...是不是故意的？",
                    "我不回消息是在享受独处，别人不回我消息是在侮辱我",
                    "我已读不回是常态，别人已读不回我直接拉黑"
                ]
            },
            {
                q: "上班摸鱼这件事，你怎么看？",
                o: [
                    "都不应该摸鱼，拿了工资就要干活",

        let currentQ = 0;
        let totalScore = 0;
        let isTransitioning = false;
        let shuffledQuestions = []; // 新增：存放打乱后的题目
        // 新增：Fisher-Yates 洗牌算法
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function showPage(pageId) {

            }, 100);
        }

        // ============ 开始测试 ============
        function startQuiz() {
            currentQ = 0;
            totalScore = 0;
            shuffledQuestions = shuffle(questions); // 新增：打乱题目
            showPage('quizPage');
            setTimeout(() => renderQuestion(), 150);
        }

        // ============ 渲染题目 ============
        function renderQuestion() {
            const q = shuffledQuestions[currentQ]; // 改为用打乱后的数组
            const card = document.getElementById('questionCard');

            // 触发重新动画
            card.style.animation = 'none';
            card.offsetHeight; // reflow
            card.style.animation = 'cardIn 0.45s ease';

            document.getElementById('qNumber').textContent = `QUESTION ${String(currentQ + 1).padStart(2, '0')}`;
            document.getElementById('qText').textContent = q.q;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            const letters = ['A', 'B', 'C', 'D'];
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="opt-letter">${letters[idx]}</span><span>${opt}</span>`;
                btn.setAttribute('aria-label', `选项${letters[idx]}: ${opt}`);
                btn.addEventListener('click', () => selectOption(idx, btn));
                container.appendChild(btn);
            });

            // 更新进度
            const pct = Math.round((currentQ / questions.length) * 100);
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressLabel').textContent = `第 ${currentQ + 1} / ${questions.length} 题`;
            document.getElementById('progressPercent').textContent = pct + '%';
        }

        // ============ 选择选项 ============
        function selectOption(idx, btn) {
            if (isTransitioning) return;
            isTransitioning = true;

            // 标记选中
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');

            // 累加分数 (索引+1)
            totalScore += (idx + 1);

            // 延迟进入下一题
            setTimeout(() => {
                currentQ++;
                if (currentQ < questions.length) {
                    renderQuestion();
                } else {
                    // 完成：更新进度条到100%
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressPercent').textContent = '100%';
                    document.getElementById('progressLabel').textContent = `第 ${questions.length} / ${questions.length} 题`;
                    setTimeout(() => showResult(), 400);
                }
                isTransitioning = false;
            }, 500);
        }

            // 背景色变化
            const resultBg = document.getElementById('resultBg');
            resultBg.style.background = `radial-gradient(ellipse at center, ${result.color}22, transparent 70%)`;
            resultBg.style.opacity = '1';

            // 显示结果页
            showPage('resultPage');

            // 延迟启动动画
            setTimeout(() => {
                gaugeFill.style.strokeDashoffset = String(offset);
                // 数字递增动画
                animateNumber(gaugeText, 0, percentage, 1500, result.color);
            }, 300);
        }

        // ============ 数字递增动画 ============
        function animateNumber(el, from, to, duration, color) {
            const start = performance.now();
            function update(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                // easeOutCubic
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(from + (to - from) * eased);
                el.textContent = current + '%';
                el.setAttribute('fill', color);
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        // ============ 复制结果 ============
        function copyResult() {
            const percentage = Math.round(((totalScore - questions.length) / (questions.length * 3)) * 100);
            let resultIdx = Math.min(Math.floor(percentage / 10), 9);
            if (percentage === 0) resultIdx = 0;
            const result = results[resultIdx];

            const text = `【双标程度鉴定结果】\n双标程度：${percentage}%\n称号：${result.title}\n${result.desc}\n\n快来测测你的双标程度有多高！`;

            navigator.clipboard.writeText(text).then(() => {
                showToast('结果已复制，快去丢人吧！');
            }).catch(() => {
                // 降级方案
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('结果已复制，快去丢人吧！');
            });
        }

        // ============ 重新测试 ============
        function restartQuiz() {
            // 重置背景
            document.getElementById('resultBg').style.opacity = '0';
            // 重置仪表盘
            document.getElementById('gaugeFill').style.strokeDashoffset = '283';
            showPage('startPage');
        }

        // ============ Toast ============
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ============ 键盘支持 ============
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('quizPage').classList.contains('hidden')) return;
            const keyMap = { '1': 0, '2': 1, '3': 2, '4': 3, 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
            const idx = keyMap[e.key.toLowerCase()];
            if (idx !== undefined && !isTransitioning) {
                const btns = document.querySelectorAll('.option-btn');
                if (btns[idx]) btns[idx].click();
            }
        });
    </script>
</body>

</html>
